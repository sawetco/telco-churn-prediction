services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models

  ui:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
    environment:
      - API_HOST=api
    depends_on:
      - api
    command: ["streamlit", "run", "streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]
